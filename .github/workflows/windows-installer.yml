name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    paths:
      - "app.py"
      - "jokes.py"
      - "launcher.py"
      - "static/**"
      - "tests/**"
      - "PigeonJokes.spec"
      - "packaging/windows/PigeonJokes.iss"
      - ".github/workflows/windows-installer.yml"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Run tests
        run: python -m unittest

      - name: Build bundled app
        run: pyinstaller PigeonJokes.spec --noconfirm --clean

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "packaging\windows\PigeonJokes.iss"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: PigeonJokesSetup
          path: installer/PigeonJokesSetup.exe
